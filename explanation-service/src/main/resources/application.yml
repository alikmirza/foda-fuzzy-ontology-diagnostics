server:
  port: 8086

spring:
  application:
    name: explanation-service

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: explanation-service-group
      auto-offset-reset: earliest
      enable-auto-commit: true

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:foda_metrics}
    username: ${POSTGRES_USER:foda_user}
    password: ${POSTGRES_PASSWORD:foda_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 2

kafka:
  topic:
    diagnostic-events: diagnostic-events

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.foda.explanation: INFO
    org.springframework.kafka: INFO
    org.springframework.jdbc: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
