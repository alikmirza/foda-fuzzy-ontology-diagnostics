version: '3.8'

services:
  # Apache Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: foda-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - foda-network
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log

  # Apache Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: foda-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - foda-network
    volumes:
      - kafka-data:/var/lib/kafka/data

  # PostgreSQL for metrics storage
  postgres:
    image: postgres:15-alpine
    container_name: foda-postgres
    environment:
      POSTGRES_DB: foda_metrics
      POSTGRES_USER: foda_user
      POSTGRES_PASSWORD: foda_pass
    ports:
      - "5432:5432"
    networks:
      - foda-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql

  # Apache Jena Fuseki (RDF Triple Store)
  fuseki:
    image: stain/jena-fuseki:latest
    container_name: foda-fuseki
    environment:
      ADMIN_PASSWORD: admin123
      JVM_ARGS: -Xmx2g
    ports:
      - "3030:3030"
    networks:
      - foda-network
    volumes:
      - fuseki-data:/fuseki
      - ./ontology:/ontology:ro
    command: /fuseki-server --loc=/fuseki/databases/foda_kb --update /foda

  # Python ML Anomaly Detection Service
  ml-service:
    build:
      context: ./ml-layer
      dockerfile: Dockerfile
    container_name: foda-ml-service
    depends_on:
      - kafka
      - postgres
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_DB: foda_metrics
      POSTGRES_USER: foda_user
      POSTGRES_PASSWORD: foda_pass
      MODEL_PATH: /ml-models
    networks:
      - foda-network
    volumes:
      - ./ml-layer:/app
      - ml-models:/ml-models

  # Service A (Monitored Microservice)
  service-a:
    build:
      context: .
      dockerfile: microservices/service-a/Dockerfile
    container_name: foda-service-a
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVICE_NAME: service-a
    networks:
      - foda-network

  # Service B (Monitored Microservice)
  service-b:
    build:
      context: .
      dockerfile: microservices/service-b/Dockerfile
    container_name: foda-service-b
    depends_on:
      - kafka
    ports:
      - "8082:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVICE_NAME: service-b
    networks:
      - foda-network

  # Service C (Monitored Microservice)
  service-c:
    build:
      context: .
      dockerfile: microservices/service-c/Dockerfile
    container_name: foda-service-c
    depends_on:
      - kafka
    ports:
      - "8083:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVICE_NAME: service-c
    networks:
      - foda-network

  # Fuzzy Diagnostic Engine (FDE)
  fuzzy-engine:
    build:
      context: .
      dockerfile: fuzzy-engine/Dockerfile
    container_name: foda-fuzzy-engine
    depends_on:
      - kafka
      - ml-service
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - foda-network

  # Ontology Mapper
  ontology-mapper:
    build:
      context: .
      dockerfile: ontology-mapper/Dockerfile
    container_name: foda-ontology-mapper
    depends_on:
      - kafka
      - fuzzy-engine
      - fuseki
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      FUSEKI_ENDPOINT: http://fuseki:3030/foda
      ONTOLOGY_PATH: /ontology/DiagnosticKB.owl
    networks:
      - foda-network

  # Explanation Service
  explanation-service:
    build:
      context: .
      dockerfile: explanation-service/Dockerfile
    container_name: foda-explanation-service
    depends_on:
      - kafka
      - postgres
      - ontology-mapper
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_DB: foda_metrics
      POSTGRES_USER: foda_user
      POSTGRES_PASSWORD: foda_pass
    networks:
      - foda-network

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: foda-api-gateway
    depends_on:
      - service-a
      - service-b
      - service-c
      - ml-service
      - fuzzy-engine
      - ontology-mapper
      - explanation-service
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVICE_A_URL: http://service-a:8080
      SERVICE_B_URL: http://service-b:8080
      SERVICE_C_URL: http://service-c:8080
      ML_SERVICE_URL: http://ml-service:8000
      FUZZY_ENGINE_URL: http://fuzzy-engine:8084
      ONTOLOGY_MAPPER_URL: http://ontology-mapper:8085
      EXPLANATION_SERVICE_URL: http://explanation-service:8086
    networks:
      - foda-network

  # Dashboard (React Frontend)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: foda-dashboard
    depends_on:
      - api-gateway
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8080/api
    networks:
      - foda-network

networks:
  foda-network:
    driver: bridge
    name: foda-network

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  postgres-data:
  fuseki-data:
  ml-models:
